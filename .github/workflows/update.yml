name: Update Frontier Terminal
on:
  schedule:
    - cron: '0 */2 * * *'
    - cron: '0 6 * * *'
  workflow_dispatch: {}
permissions:
  contents: write
concurrency:
  group: frontier-update
  cancel-in-progress: false
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Prices (every run)
        run: python fetch_prices.py
        continue-on-error: true
      - name: Buzz (daily / manual)
        if: github.event.schedule == '0 6 * * *' || github.event_name == 'workflow_dispatch'
        run: python fetch_buzz.py
        continue-on-error: true
      - name: Federal awards (daily / manual)
        if: github.event.schedule == '0 6 * * *' || github.event_name == 'workflow_dispatch'
        run: python fetch_awards.py
        continue-on-error: true
      - name: Build site
        run: python build.py
      - name: Commit refreshed data + site
        run: |
          git config user.name "frontier-bot"
          git config user.email "frontier-bot@users.noreply.github.com"
          git add -A
          git commit -m "data refresh $(date -u +%FT%TZ)" || echo "no changes"
          git push
