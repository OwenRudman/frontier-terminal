<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Frontier Terminal</title>
<style>
:root{color-scheme:light}
*{box-sizing:border-box}
body{margin:0;font:13px/1.45 -apple-system,Segoe UI,Roboto,sans-serif;color:#0b1220;background:#f6f8fb;font-variant-numeric:tabular-nums}
.top{position:sticky;top:0;z-index:20;background:#0f172a;color:#fff;padding:10px 16px}
.t1{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.brand{font-weight:500;font-size:15px;letter-spacing:.14em}
.brand small{font-weight:400;color:#94a3b8;font-size:11px}
.secbar{display:flex;gap:6px;margin-left:auto}
.seg{background:#1e293b;color:#cbd5e1;border:1px solid #334155;border-radius:7px;padding:6px 12px;cursor:pointer;font-size:12px;font-weight:600}
.seg.on{background:#1d4ed8;color:#fff;border-color:#1d4ed8}
.t2{display:flex;align-items:center;gap:8px;margin-top:9px;flex-wrap:wrap}
.tabbar{display:flex;gap:4px}
.tab{background:transparent;color:#94a3b8;border:none;border-bottom:2px solid transparent;padding:5px 10px;cursor:pointer;font-size:12.5px;font-weight:600}
.tab.on{color:#fff;border-color:#60a5fa}
#q{margin-left:auto;background:#1e293b;border:1px solid #334155;color:#fff;border-radius:7px;padding:6px 10px;font-size:12px;width:180px}
.fbtn{background:#1e293b;color:#cbd5e1;border:1px solid #334155;border-radius:7px;padding:6px 10px;cursor:pointer;font-size:11.5px;font-weight:600}
.fbtn.on{background:#0ea5e9;color:#fff;border-color:#0ea5e9}
.meta{color:#94a3b8;font-size:11px;margin-top:6px}
.estflag{color:#fbbf24}
#main{padding:16px;max-width:1280px;margin:0 auto}
.note,.maphint{background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:9px 12px;font-size:11.5px;color:#475569;margin-bottom:12px}
.fwd{color:#0891b2;font-weight:700}
/* map */
.mapwrap{position:relative;overflow:hidden;border:none;border-radius:0;background:#fff;padding:8px;height:74vh}
.pzh{position:relative;transform-origin:0 0;width:max-content}
#edges{position:absolute;left:0;top:0;pointer-events:none;z-index:5}
.cols{display:flex;gap:26px;position:relative;z-index:1;min-width:max-content}
.tcol{display:flex;flex-direction:column;gap:12px;width:210px}
.tname{font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid #e2e8f0;padding-bottom:4px}
.cl{background:#f8fafc;border:1px solid #e2e8f0;border-radius:9px;padding:8px}
.clt{font-weight:700;font-size:12px}
.cld{font-size:10.5px;color:#64748b;margin:2px 0 6px}
.chips{display:flex;flex-wrap:wrap;gap:4px}
.chip{background:#fff;border:1.5px solid #bbb;border-radius:6px;padding:2px 6px;font-size:11px;font-weight:600;cursor:pointer}
.chip:hover{background:#eff6ff}
.chip.dim{opacity:.25}
.chip.hold{box-shadow:0 0 0 2px #fde68a}
.chip.hold::after{content:' ◆';color:#d97706}
/* comps */
table.comps{width:100%;border-collapse:collapse;background:#fff;border:1px solid #e2e8f0;border-radius:10px;overflow:hidden;font-size:12px}
.comps th{background:#f8fafc;text-align:right;padding:8px 10px;cursor:pointer;border-bottom:1px solid #e2e8f0;color:#475569;white-space:nowrap;user-select:none}
.comps th.sorted{color:#1d4ed8}
.comps th:nth-child(1),.comps th:nth-child(2){text-align:left}
.comps td{text-align:right;padding:7px 10px;border-bottom:1px solid #f1f5f9}
.comps td.tk,.comps td.nm{text-align:left}
.comps td.tk{font-weight:700;color:#0f172a}
.comps td.nm{color:#334155}
.comps td.fwd{color:#0891b2;font-weight:700}
.comps td.street{color:#7c3aed;font-weight:600}
.comps tr:hover td{background:#f8fafc;cursor:pointer}
.scb{display:inline-block;min-width:30px;text-align:center;background:linear-gradient(90deg,#dbeafe var(--w),#fff var(--w));border:1px solid #bfdbfe;border-radius:5px;padding:1px 4px;font-weight:700}
/* catalysts */
.catlist{display:flex;flex-direction:column;gap:8px}
.cat{display:flex;gap:12px;background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:9px 12px}
.catd{font-weight:700;color:#1d4ed8;font-size:11.5px;min-width:120px}
.catt{font-weight:600}
.catw{font-size:11.5px;color:#64748b;margin-top:2px}
.tk{color:#1d4ed8;cursor:pointer;font-weight:700}
/* drilldown */
.drill{position:fixed;top:0;right:0;height:100%;width:min(720px,94vw);background:#fff;box-shadow:-8px 0 30px rgba(0,0,0,.18);transform:translateX(100%);transition:transform .22s;z-index:50;overflow:auto;padding:18px 22px}
.drill.open{transform:none}
.dclose{position:absolute;top:14px;right:16px;border:none;background:#f1f5f9;border-radius:7px;width:30px;height:30px;cursor:pointer;font-size:16px}
.dtk{font-size:22px;font-weight:800}
.dn{color:#334155;margin-top:2px;font-size:13px}
.pill{color:#fff;border-radius:5px;padding:1px 8px;font-size:10.5px;font-weight:700;vertical-align:middle}
.pill.priv{background:#7c3aed}
.holdbar{background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:7px 11px;margin:11px 0;font-weight:600;font-size:12px;color:#92400e}
.dgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:12px 0}
.st{background:#f8fafc;border:1px solid #eef2f6;border-radius:8px;padding:7px 9px}
.stl{font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:.3px}
.stv{font-weight:700;font-size:13px;margin-top:1px}
.mut{color:#94a3b8}
.drow{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:8px 0}
.street,.ep{background:#f8fafc;border:1px solid #e2e8f0;border-radius:9px;padding:10px 12px}
.street.empty{color:#64748b;font-size:11.5px;background:#fefce8;border-color:#fde68a}
.sh{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:#475569;margin:8px 0 4px}
.src{font-weight:400;color:#94a3b8;text-transform:none;letter-spacing:0}
.strow{font-size:13px;margin:3px 0}
.eptab{width:100%;border-collapse:collapse;font-size:12px}
.eptab td{padding:3px 0;border-bottom:1px solid #eef2f6}.eptab td:last-child{text-align:right}
.dcols{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:6px}
.dcol p{margin:3px 0 6px;font-size:12.5px}
.dcol ul{margin:3px 0;padding-left:18px}.dcol li{font-size:12px;margin:2px 0}
.radar{width:100%;max-width:230px;display:block}
@media(max-width:760px){.dgrid{grid-template-columns:repeat(2,1fr)}.drow,.dcols{grid-template-columns:1fr}}

/* compare */
.cmpsel{background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:8px 12px;margin-bottom:10px;font-size:12px}
.lg{display:inline-block;border:1.5px solid var(--c);color:var(--c);border-radius:6px;padding:1px 4px 1px 8px;font-weight:700;margin-right:6px}
.lg button{border:none;background:none;color:var(--c);cursor:pointer;font-size:13px;font-weight:700}
.clr{border:none;background:#f1f5f9;border-radius:6px;padding:3px 8px;cursor:pointer;font-size:11px;margin-left:6px}
.cmpgrid{display:grid;grid-template-columns:400px 1fr;gap:16px;align-items:start}
.cmpradar{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:10px;display:flex;justify-content:center}
.radarBig{width:100%;max-width:400px}
.cmptblwrap{overflow:auto}
table.cmptab{width:100%;border-collapse:collapse;background:#fff;border:1px solid #e2e8f0;border-radius:10px;overflow:hidden;font-size:12px}
.cmptab th{background:#f8fafc;padding:7px 10px;text-align:right;border-bottom:1px solid #e2e8f0;font-weight:700}
.cmptab th:first-child{text-align:left}
.cmptab td{text-align:right;padding:6px 10px;border-bottom:1px solid #f1f5f9}
.cmptab td.ml{text-align:left;color:#475569}
.cmptab tr:hover td{background:#f8fafc}
.cmppick{margin-top:14px}
.pchips{display:flex;flex-wrap:wrap;gap:5px}
.pchip{background:#fff;border:1px solid #cbd5e1;border-radius:6px;padding:3px 8px;font-size:11px;font-weight:600;cursor:pointer}
.pchip:hover{background:#eff6ff}
.pchip.on{background:#1d4ed8;color:#fff;border-color:#1d4ed8}
.cmpbtn{margin-top:10px;background:#0ea5e9;color:#fff;border:none;border-radius:7px;padding:6px 12px;cursor:pointer;font-weight:700;font-size:12px}
@media(max-width:760px){.cmpgrid{grid-template-columns:1fr}}

.estbadge{background:#fef3c7;color:#92400e;border:1px solid #fde68a;border-radius:4px;padding:0 5px;font-size:9.5px;font-weight:700;text-transform:uppercase;vertical-align:middle}
.vnote{font-size:11px;color:#64748b;margin-top:3px;font-style:italic}
.presets{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:10px}
.plabel{font-size:11px;color:#64748b;font-weight:600}
.pbtn{background:#fff;border:1px solid #cbd5e1;border-radius:7px;padding:5px 10px;cursor:pointer;font-size:11.5px;font-weight:600}
.pbtn:hover{background:#eff6ff;border-color:#1d4ed8}

.lean{display:inline-block;border-radius:5px;padding:1px 7px;font-size:10.5px;font-weight:700}
.lean.lb{background:#dcfce7;color:#15803d;border:1px solid #86efac}
.lean.lh{background:#fef9c3;color:#a16207;border:1px solid #fde047}
.lean.lp{background:#fee2e2;color:#b91c1c;border:1px solid #fca5a5}
.up{color:#16a34a}.down{color:#dc2626}
.scatwrap{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:12px 12px 6px;margin-bottom:14px;position:relative}
.scatter{width:100%;height:auto;display:block}
.bub{cursor:pointer}.bub:hover circle{fill-opacity:.5}
.axlabel-x{text-align:center;font-size:11px;color:#64748b;font-weight:600;margin-top:2px}
.axlabel-y{position:absolute;left:-2px;top:50%;transform:rotate(-90deg);transform-origin:left;font-size:11px;color:#64748b;font-weight:600;white-space:nowrap}

.liveon{color:#16a34a;font-weight:700}
.livep{color:#0f172a;font-weight:600;white-space:nowrap}
.livechip{background:#ecfdf5;border:1px solid #a7f3d0;border-radius:6px;padding:1px 7px;font-size:12px;font-weight:700;color:#065f46;vertical-align:middle}
.scatbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;font-size:11px}
.scatter{touch-action:none}

.mapmodes{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.mm{background:#fff;border:1px solid #cbd5e1;border-radius:7px;padding:5px 12px;cursor:pointer;font-size:12px;font-weight:600}
.mm.on{background:#0f172a;color:#fff;border-color:#0f172a}
.geowrap,.netwrap,.tmwrap,.matwrap{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:8px;overflow:auto}
.geosvg,.netsvg,.tmsvg,.matsvg{width:100%;height:auto;display:block;min-width:680px}

.mapbox{background:#fff;border:none;border-radius:0;padding:0;overflow:hidden;height:74vh}
.mapsvg{width:100%;height:100%;display:block;touch-action:none;cursor:grab}
.maptools{display:flex;justify-content:space-between;align-items:center;margin:6px 0;font-size:11px}
.lbl{paint-order:stroke;stroke:#fff;stroke-width:3px;stroke-linejoin:round}

.gcgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:8px;max-height:74vh;overflow:auto;padding:2px}
.gco{background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:8px 11px;cursor:pointer;display:flex;align-items:center;gap:9px;font-size:12px}
.gco:hover{background:#eff6ff;border-color:#1d4ed8}
.gdot{width:10px;height:10px;border-radius:50%;flex:0 0 auto}
.gco b{flex:0 0 auto}
.gnm{color:#475569;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gmc{margin-left:auto;font-weight:700;color:#0f172a;flex:0 0 auto}

.reportoverlay{position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:200;overflow:auto;display:none}
.reportoverlay.open{display:block}
.repbar{position:sticky;top:0;display:flex;gap:10px;justify-content:flex-end;align-items:center;padding:9px 16px;background:#0f172a}
.rephint{margin-right:auto;color:#94a3b8;font-size:11px}
.repbar button{background:#1d4ed8;color:#fff;border:none;border-radius:7px;padding:8px 14px;font-weight:700;cursor:pointer;font-size:12px}
.repbar button.rcl{background:#475569}
#report{background:#fff;max-width:880px;margin:18px auto 70px;padding:34px 42px;box-shadow:0 12px 44px rgba(0,0,0,.35);color:#0f172a}
.rephead{border-bottom:3px solid #0f172a;padding-bottom:10px;margin-bottom:6px}
.reptk{font-size:26px;font-weight:800}
.repname{color:#334155;font-size:13.5px;margin-top:2px}
.repmeta{color:#64748b;font-size:11px;margin-top:4px}
.repsec{font-size:11.5px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:#1e293b;border-bottom:1px solid #e2e8f0;margin:18px 0 8px;padding-bottom:3px}
.repgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
.rs{background:#f8fafc;border:1px solid #eef2f6;border-radius:6px;padding:6px 9px}
.rsl{font-size:9px;text-transform:uppercase;color:#64748b;letter-spacing:.3px}
.rsv{font-weight:700;font-size:12.5px;margin-top:1px}
.repcharts{display:grid;grid-template-columns:1fr 1fr;gap:18px;align-items:center}
.repchart{width:100%;max-width:280px}
.repbars{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.repbarc{border:1px solid #eef2f6;border-radius:8px;padding:6px}
.repbart{font-size:10px;font-weight:700;color:#475569;text-align:center}
.reptbl{width:100%;border-collapse:collapse;font-size:11px}
.reptbl th{background:#f1f5f9;text-align:right;padding:5px 8px;border-bottom:1px solid #cbd5e1}
.reptbl td{text-align:right;padding:4px 8px;border-bottom:1px solid #eef2f6}
.reptbl th:first-child,.reptbl td:first-child{text-align:left}
.reprow-self{background:#eff6ff;font-weight:700}
.repcols{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.repcols h4{margin:0 0 4px;font-size:12px}
.repcols p{margin:0;font-size:12px}
#report ul{margin:4px 0;padding-left:18px}#report li{font-size:11.5px;margin:2px 0}
.repfoot{margin-top:22px;border-top:1px solid #e2e8f0;padding-top:8px;font-size:9.5px;color:#94a3b8}
.cmpbtn.alt{background:#7c3aed}
@media print{
  body.printing>*{display:none!important}
  body.printing .reportoverlay{display:block!important;position:static;background:#fff;overflow:visible}
  body.printing .repbar{display:none!important}
  body.printing #report{box-shadow:none;margin:0;max-width:100%;padding:0}
  .repsec,.rephead{break-after:avoid}
  .repbarc,.rs,table{break-inside:avoid}
  @page{margin:14mm}
}
.netf{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.nfb{background:#fff;border:1px solid #cbd5e1;border-radius:7px;padding:4px 10px;cursor:pointer;font-size:11px;font-weight:600}
.nfb:hover{background:#eff6ff}
.nfb.on{background:#0f172a;color:#fff;border-color:#0f172a}

.newsbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:10px}
.newscats{display:flex;flex-wrap:wrap;gap:5px}
.ncf{background:#fff;border:1px solid #cbd5e1;border-radius:7px;padding:4px 10px;cursor:pointer;font-size:11px;font-weight:600}
.ncf.on{background:#0f172a;color:#fff;border-color:#0f172a}
.nck{font-size:11px;color:#475569;display:flex;align-items:center;gap:4px}
.newsmeta{font-size:11px;color:#64748b;margin-bottom:8px}
.newslist{display:flex;flex-direction:column;gap:8px}
.nart{background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:10px 12px}
.nmeta{display:flex;flex-wrap:wrap;align-items:center;gap:6px;margin-bottom:3px}
.ncat{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;border-radius:4px;padding:1px 6px;color:#fff}
.nc-con{background:#16a34a}.nc-ma{background:#7c3aed}.nc-an{background:#1d4ed8}.nc-cap{background:#d97706}.nc-ea{background:#0891b2}.nc-op{background:#475569}.nc-ot{background:#94a3b8}
.ntk{font-size:10.5px;font-weight:700;color:#1d4ed8;cursor:pointer;border:1px solid #bfdbfe;border-radius:4px;padding:0 5px}
.ntk.mega{color:#94a3b8;border-color:#e2e8f0}
.ndate{font-size:10.5px;color:#94a3b8;margin-left:auto}
.nhead{font-weight:700;font-size:13px;color:#0f172a}
.nbody{font-size:11.5px;color:#475569;margin-top:2px}
.dnews{border-top:1px solid #f1f5f9;padding:5px 0}
.dnh{font-size:12px;font-weight:600;color:#0f172a;margin-top:1px}
.ncrit{font-size:9.5px;font-weight:800;color:#b91c1c;border:1px solid #fca5a5;background:#fee2e2;border-radius:4px;padding:0 5px}
.newssort{display:inline-flex;gap:4px;margin-left:auto}
.comps td.buzzhot{font-weight:800;color:#dc2626}

.implbox{background:#f0f7ff;border:1px solid #bfdbfe;border-radius:8px;padding:10px 12px;font-size:12.5px;color:#1e3a5f}
.scentab{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:4px}
.scentab th{text-align:left;background:#f8fafc;padding:5px 8px;border-bottom:1px solid #e2e8f0;font-size:10px;text-transform:uppercase;color:#64748b}
.scentab td{padding:5px 8px;border-bottom:1px solid #f1f5f9;vertical-align:top}
.scentab .scl{font-weight:800}.scentab .scd{font-weight:700;white-space:nowrap}
.thesisgrid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:6px}
.thpt{margin-bottom:9px}
.thp{font-weight:700;font-size:12.5px;padding-left:8px;border-left:3px solid #cbd5e1}

.thd{margin:3px 0 0;padding-left:24px}

.nth{font-size:9.5px;font-weight:800;color:#7c3aed;border:1px solid #ddd6fe;background:#f5f3ff;border-radius:4px;padding:0 5px;cursor:help}
@media(max-width:760px){.thesisgrid{grid-template-columns:1fr}}
.snotes{margin-top:6px;border-top:1px solid #eef2f6;padding-top:5px}
.snote{font-size:11px;color:#334155;padding:1px 0}
.snf{font-weight:700}
.sgnl{display:flex;flex-wrap:wrap;gap:8px;align-items:baseline;border-radius:8px;padding:8px 12px;margin:6px 0 2px;font-size:12px}

.tname .tdef{font-size:10px;font-weight:400;color:#64748b;text-transform:none;letter-spacing:0;margin-top:3px;line-height:1.3}
.chaintools{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:6px}

one supercycle", "Constrained drone supply environment prioritizing U.S.-based suppliers"]}, {"firm": "Firm D", "rating": "Buy", "pt": 25.0, "ptPrior": 25.0, "date": "2026-05-18", "points": ["Reiterate Buy/$25 PT after better-than-expected 1Q26; revenue $8.1M (+296% Y/Y, +65% Q/Q), $10.3M net income", "Raised estimates: $35.5M revenue 2026, $50.1M 2027"]}, {"firm": "Firm E", "rating": "Buy", "pt": 25.0, "ptPrior": 25.0, "date": "2026-04-23", "points": ["Reiterate Buy/$25 PT; orders validate the ramp, setting up an earnings inflection", "New $5M+ enterprise order supports near-term revenue visibility"]}, {"firm": "Firm F", "rating": "Buy", "pt": 20.0, "ptPrior": 20.0, "date": "2026-03-06", "points": ["Reiterate Buy/$20 PT after strong 4Q25: revenue +130% Y/Y to $4.9M, 40% above estimate; gross margin 36.2%", "Strongly positioned in US Drone Dominance; working with 6 of 11 Gauntlet/Tranche 1 awardees"]}, {"firm": "Firm G", "rating": "Buy", "pt": 20.0, "ptPrior": 20.0, "date": "2026-03-04", "points": ["Unusual Machines a Buy in sell-side drone preview"]}], "plain": "Instead of building drones, it makes the parts inside them \u2014 especially motors , plus FPV components (owns Fat Shark & Rotor Riot). The thesis: as the U.S. bans Chinese parts, someone must supply NDAA-compliant, American-made components . UMAC is building an Orlando motor factory to be that supplier \u2014 a potential \"Intel moment\" for domestic drone hardware. Acquiring a battery firm (Upgrade Energy) to widen the catalog.", "futuretext": "The most leveraged way to bet on re-shoring the drone supply chain: if dozens of U.S. drone programs all need China-free motors and batteries, the supplier to all of them is a tollbooth on the whole industry. That's a genuinely big TAM and would justify a lot. The honest counterpoint: today it's ~$30M of revenue, the recent profit was an investment fluke, and components historically become commodities. The \"exponential\" here is more plausible than proven .", "fc function chainEdges(){ const e=(V().edges&&V().edges.length)?V().edges:[]; if(e.length)return e; const cl=V().clusters,out=[]; cl.forEach(a=>cl.filter(b=>b.tier===a.tier+1).forEach(b=>out.push({a:a.id,b:b.id,t:'flow'}))); return out; }
function chainRel(){const co=CO(); return (DATA.relationships||[]).filter(e=>co[e[0]]&&co[e[1]]).map(e=>({a:e[0],b:e[1],t:e[2]}));}
function clusterOf(t){const cl=V().clusters; for(const c of cl){if((c.nodes||[]).includes(t))return c.id;} return null; }
let hoverReach=null;
function reachTree(fc,depth){depth=depth||1; if(!fc)return {set:new Set(),edges:[]}; const adj={}; chainEdges().forEach(e=>{(adj[e.a]=adj[e.a]||[]).push({n:e.b,t:e.t});(adj[e.b]=adj[e.b]||[]).push({n:e.a,t:e.t});}); const seen=new Set([fc]),edges=[]; let fr=[fc]; for(let d=0;d<depth&&fr.length;d++){const nf=[]; fr.forEach(x=>{(adj[x]||[]).forEach(o=>{if(!seen.has(o.n)){seen.add(o.n);edges.push({a:x,b:o.n,t:o.t});nf.push(o.n);}});}); fr=nf;} return {set:seen,edges};}
function compAdj(){const adj={}; chainRel().forEach(e=>{(adj[e.a]=adj[e.a]||[]).push({u:e.b,t:e.t});(adj[e.b]=adj[e.b]||[]).push({u:e.a,t:e.t});}); return adj;}
function reachTreeCo(start,depth){depth=depth||1; const adj=compAdj(); const seen=new Set([start]),edges=[]; let fr=[start];
  for(let d=0;d<depth&&fr.length;d++){const nf=[]; fr.forEach(x=>{(adj[x]||[]).forEach(o=>{if(!seen.has(o.u)){seen.add(o.u);edges.push({a:x,b:o.u,t:o.t});nf.push(o.u);}});}); fr=nf;}
  return {set:seen,edges};}
function reachFrom(fc){if(!fc)return new Set(); const adj={}; chainEdges().forEach(e=>{(adj[e.a]=adj[e.a]||[]).push(e.b);(adj[e.b]=adj[e.b]||[]).push(e.a);}); const seen=new Set([fc]),q=[fc]; while(q.length){const x=q.shift();(adj[x]||[]).forEach(y=>{if(!seen.has(y)){seen.add(y);q.push(y);}});} return seen;}
function hoverChain(t){if(focusSet.length)return; hoverReach=reachTreeCo(t,1);
  document.querySelectorAll('#mapwrap .chip').forEach(el=>el.classList.toggle('hdim',!hoverReach.set.has(el.getAttribute('data-t'))));
  document.querySelectorAll('#mapwrap .cl').forEach(el=>{const cz=V().clusters.find(c=>c.id===el.id.replace('cl-',''));el.classList.toggle('hdim',!(cz&&(cz.nodes||[]).some(n=>hoverReach.set.has(n))));});

function hoverClear(){if(focusSet.length)return; hoverReach=null;

function toggleEdgeType(t){edgeTypes[t]=!edgeTypes[t];render();}

function expandChain(){focusDepth=focusDepth>=99?1:99;render();}
function clearFocus(){focusSet=[];render();}
function renderChain(){
  const cl=V().clusters, names=V().tierNames, defs=V().tierDefs||[];
  const vis=new Set(visible().map(x=>x[0]));
  const edges=chainEdges();
  // dim set when focused: keep focus cluster + its connected clusters
  let coKeep=null, clKeep=null;
  if(focusSet.length){coKeep=new Set(); focusSet.forEach(f=>reachTreeCo(f,focusDepth).set.forEach(x=>coKeep.add(x)));}
  else{const en=[];for(const k in edgeTypes)if(edgeTypes[k])en.push(k); if(en.length){clKeep=new Set();edges.forEach(e=>{if(en.indexOf(e.t)>=0){clKeep.add(e.a);clKeep.add(e.b);}});}}
  const tiers={}; cl.forEach(c=>{(tiers[c.tier]=tiers[c.tier]||[]).push(c);});
  const tks=Object.keys(tiers).sort((a,b)=>a-b);
  let cols=tks.map(tk=>{
    const head=`<div class="tname">${names[tk-1]||('Tier '+tk)}<div class="tdef">${esc(defs[tk-1]||'')}</div></div>`;
    const cards=tiers[tk].map(cz=>{
      const cdim=coKeep&&!(cz.nodes||[]).some(n=>coKeep.has(n))?' fade':'';
      const chips=(cz.nodes||[]).map(t=>{
        const c=CO()[t]; if(!c)return '';
        const filt=!vis.has(t); const fade=coKeep&&!coKeep.has(t);
        const foc=focusSet.indexOf(t)>=0?' foc':'';
        const hold=c.hold?' hold':'';
        const tip=`${esc(c.n)} — ${esc(c.seg||'')} · Tier ${c.tier} · ${EXPL[c.exp]||c.exp}${c.hold?' · ◆ held':''}`;
        return `<span class="chip${filt?' dim':''}${fade?' fade':''}${hold}${foc}" id="ch-${t}" data-cl="${cz.id}" data-t="${t}" style="border-color:${EXPC[c.exp]||'#bbb'}" onclick="focusChainNode('${t}')" ondblclick="openDrill('${t}')" onmouseenter="hoverChain('${t}')" onmouseleave="hoverClear()" title="${tip}">${t}</span>`;
      }).join('');
      return `<div class="cl${cdim}" id="cl-${cz.id}"><div class="clt">${esc(cz.title)}</div><div class="cld">${esc(cz.desc||'')}</div><div class="chips">${chips}</div></div>`;
    }).join('');
    return `<div class="tcol">${head}${cards}</div>`;
  }).join('');
  const typesPresent=[...new Set(edges.map(e=>e.t))];
  const toggles=typesPresent.map(t=>`<button class="ctog${edgeTypes[t]?' on':''}" style="--ec:${ET[t]||'#94a3b8'}" onclick="toggleEdgeType('${t}')"><span class="cdot"></span>${TYNAME[t]||t}</button>`).join('');
  const focusbar=focusSet.length?`<span class="focusbar">◎ ${focusSet.map(f=>`<b>${f}</b><button class="fx" onclick="focusChainNode('${f}')" title="remove">✕</button>`).join(' ')} · <button onclick="expandChain()">${focusDepth>=99?'Collapse':'Expand chains →'}</button> ${focusSet.length===1?`<button onclick="openDrill('${focusSet[0]}')">\u2922 Open drilldown</button>`:''} <button onclick="clearFocus()">Clear all</button></span>`:`<span class="cthint">Click companies to overlay their specific links (click several to compare) · double-click to open · toggle types →</span>`;
  return `<div class="maphint">Value chain flows left → right. Border colour = exposure:
    <span style="color:${EXPC.direct}">●Direct</span> <span style="color:${EXPC.indirect}">●Indirect</span>
    <span style="color:${EXPC.private}">●Private</span> <span style="color:${EXPC.intl}">●Intl</span>. ◆ = your holding.</div>
    <div class="chaintools"><span class="ctlabel">Connection lines:</span>${toggles}</div>
    <div class="chainfocus">${focusbar}<span class="chainzoom mut">scroll to zoom · drag to pan · <button class="pbtn" onclick="resetPZ()">Reset</button></span></div>
    <div class="mapwrap" id="mapwrap"><div class="pzh" id="pzh"><svg id="edges"></svg><div class="cols">${cols}</div></div></div>`;
}
function drawEdges(){
  const pzh=document.getElementById('pzh'); if(!pzh)return;
  const svg=document.getElementById('edges'); if(!svg)return;
  const k=(PZ['chain']&&PZ['chain'].k)||1;
  const pr=pzh.getBoundingClientRect();
  const W=pzh.offsetWidth,H=pzh.offsetHeight;
  svg.setAttribute('width',W);svg.setAttribute('height',H);svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
  function box(elid){const e=document.getElementById(elid);if(!e)return null;const r=e.getBoundingClientRect();
    return {l:(r.left-pr.left)/k,r:(r.right-pr.left)/k,cy:((r.top+r.bottom)/2-pr.top)/k};}
  let edges;
  if(hoverReach){edges=hoverReach.edges.map(e=>({...e,hi:1}));}
  else if(focusSet.length){const seen=new Set();edges=[];focusSet.forEach(f=>reachTreeCo(f,focusDepth).edges.forEach(e=>{const k=[e.a,e.b].sort().join('|');if(!seen.has(k)){seen.add(k);edges.push({...e,hi:1});}}));}
  else {edges=chainRel().filter(e=>edgeTypes[e.t]);}
  let p='';
  edges.forEach((e,i)=>{const A=box('ch-'+e.a),B=box('ch-'+e.b);if(!A||!B)return;
    let x1=A.r,y1=A.cy,x2=B.l,y2=B.cy,dir=1; if(x2<x1){x1=A.l;x2=B.r;dir=-1;}
    const gx=x2-dir*(16+(i%5)*7);
    p+=`<path d="M${x1} ${y1} C${gx} ${y1} ${gx} ${y2} ${x2} ${y2}" stroke="${ET[e.t]||'#94a3b8'}" fill="none" stroke-width="${e.hi?2.2:1.5}" opacity="${e.hi?0.92:0.65}" stroke-linecap="round"/>`;});
  svg.innerHTML=p;
}

function wirePZ(){
  const svg=document.getElementById('mapsvg'); if(!svg)return;
  const g=svg.querySelector('g.pz'); if(!g)return;
  const vb=svg.viewBox.baseVal, W=vb.width||1000, H=vb.height||520;
  const st=PZ[mapMode]||(PZ[mapMode]={k:1,x:0,y:0});
  const apply=()=>g.setAttribute('transform',`translate(${st.x} ${st.y}) scale(${st.k})`);
  apply(); svg.style.cursor='grab';

  svg.onwheel=(e)=>{e.preventDefault();const r=svg.getBoundingClientRect();const mx=(e.clientX-r.left)/r.width*W,my=(e.clientY-r.top)/r.height*H;const f=e.deltaY<0?1.15:1/1.15,nk=Math.max(0.3,Math.min(12,st.k*f));st.x=mx-(mx-st.x)*(nk/st.k);st.y=my-(my-st.y)*(nk/st.k);st.k=nk;apply();};
  svg.onpointerdown=(e)=>{drag=true;moved=false;lx=e.clientX;ly=e.clientY;dnx=e.clientX;dny=e.clientY;svg.style.cursor='grabbing';};
  svg.onpointermove=(e)=>{if(!drag)return;const r=svg.getBoundingClientRect();if(Math.abs(e.clientX-dnx)+Math.abs(e.clientY-dny)>5)moved=true;st.x+=(e.clientX-lx)/r.width*W;st.y+=(e.clientY-ly)/r.height*H;lx=e.clientX;ly=e.clientY;apply();};

}

function findCo(t){for(const vk in DATA.verticals){if(DATA.verticals[vk].companies[t])return DATA.verticals[vk].companies[t];}return null;}
function inCmp(t){return cmp.includes(t);}
function toggleCmp(t){ if(inCmp(t)) cmp=cmp.filter(x=>x!==t); else { if(cmp.length>=5) return; cmp.push(t);} if(curTab!=='compare')render(); else render(); }
function clearCmp(){cmp=[];render();}
const PRESETS=[

  {k:'vh',l:'💰 Cheap × Healthy',d:'cheapest names with a solid balance sheet',f:c=>(c.sc?c.sc[3]+c.sc[2]:0)},

  {k:'pp',l:'🚀 Priced for perfection',d:'high growth + expensive (low value score)',f:c=>(c.sc?c.sc[0]+(100-c.sc[3]):0)},

    ['· Value',c=>c.sc?c.sc[3]:'—'],['· Exposure',c=>c.sc?c.sc[4]:'—'],['Street',c=>c.street?esc(c.street.rating):'—'],['PT',c=>c.street?'$'+c.street.ptAvg:'—']];

  return presetbar+`<div class="note">Overlay the 5-axis profile of up to 5 names. Axes are 0–100 relative scores: <b>Growth · Margin · Health · Value · Exposure</b>. Shape shows the trade-off; the table shows the actual numbers. <b>Value</b> axis is high = cheap.</div>

function radarMulti(sel){
  const labs=['Growth','Margin','Health','Value','Exposure'],cx=200,cy=185,R=130;
  function pt(i,r){const a=-Math.PI/2+i*2*Math.PI/5;return [cx+r*Math.cos(a),cy+r*Math.sin(a)];}
  let g='';for(let q2=1;q2<=4;q2++){const pts=labs.map((_,i)=>pt(i,R*q2/4).join(',')).join(' ');g+=`<polygon points="${pts}" fill="none" stroke="#e2e8f0"/>`;}
  labs.forEach((_,i)=>{const[x,y]=pt(i,R);g+=`<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="#eef2f6"/>`;});
  let polys='';
  sel.forEach(x=>{ if(!x.c.sc)return;
    const pts=x.c.sc.map((v,i)=>pt(i,R*Math.max(0,Math.min(100,v))/100).join(',')).join(' ');
    polys+=`<polygon points="${pts}" fill="${x.color}22" stroke="${x.color}" stroke-width="2"/>`;
    polys+=x.c.sc.map((v,i)=>{const[px,py]=pt(i,R*Math.max(0,Math.min(100,v))/100);return `<circle cx="${px}" cy="${py}" r="3" fill="${x.color}"/>`;}).join('');
  });
  const lab=labs.map((l,i)=>{const[x,y]=pt(i,R+22);return `<text x="${x}" y="${y}" font-size="11" fill="#475569" text-anchor="middle" font-weight="600">${l}</text>`;}).join('');
  return `<svg viewBox="0 0 400 390" class="radarBig">${g}${polys}${lab}</svg>`;
}

/* ---------- DRILLDOWN ---------- */
function streetSignal(t,c){
  if(!c.street)return {label:'No recent Street coverage',cls:'sg-mix',why:'no analyst notes ingested for this name yet'};
  const s=c.street,notes=c.streetNotes||[];let raises=0,cuts=0;
  notes.forEach(n=>{if(n.pt&&n.ptPrior){if(n.pt>n.ptPrior)raises++;else if(n.pt<n.ptPrior)cuts++;}});
  const lp=(typeof LIVE!=='undefined'&&LIVE[t])?LIVE[t].p:null;const up=(lp&&s.ptAvg)?(s.ptAvg/lp-1):null;
  const rb=/buy|outperform|overweight|strong/i.test(s.rating||''),rbear=/sell|underperform|underweight|reduce/i.test(s.rating||'');
  let sc=0;if(rb)sc+=1;if(rbear)sc-=2;if(raises>cuts)sc+=1;if(cuts>raises)sc-=1;if(up!=null){if(up>0.25)sc+=1;if(up<0)sc-=1;}
  const why=[`${esc(s.rating||'?')} (${s.nAnalysts||'?'} firms)`];
  if(cuts>raises)why.push(`targets being CUT (${cuts}\u2193 vs ${raises}\u2191)`);
  else if(raises>cuts)why.push(`targets rising (${raises}\u2191 vs ${cuts}\u2193)`);
  if(up!=null)why.push(`${up>=0?'+':''}${Math.round(up*100)}% to avg PT`);
  let label,cls;
  if(sc>=2){label='Street CONFIRMS the bull';cls='sg-bull';}
  else if(sc<=-1){label='Street LEANS AGAINST the bull';cls='sg-bear';}
  else {label='Street MIXED / cooling';cls='sg-mix';}
  return {label,cls,why:why.join(' \u00b7 ')};
}

function radarSVG(sc){

  const _allc=[];const _seen={};for(const vk3 in DATA.verticals){const cc3=DATA.verticals[vk3].companies;for(const t3 in cc3){if(cc3[t3].pub&&inVert(t3)&&!_seen[t3]){_seen[t3]=1;_allc.push([t3,cc3[t3]]);}}}
  const _ideas=_allc.filter(x=>lean(x[1])!=null).sort((a,b)=>lean(b[1])-lean(a[1])).slice(0,8);
  const ideaCard=_ideas.length?dcard('Top scores \u2014 lean','<ul class="dlist">'+_ideas.map(([t,c])=>`<li onclick="openDrill('${t}')"><b class="tk">${t}</b> <span class="mono">${lean(c)}</span> <span class="mut">${esc(c.n)}</span></li>`).join('')+'</ul>','<span class="src">composite lean</span>'):'';
  const _rich=_allc.filter(x=>evs(x[1])!=null&&evs(x[1])>0).sort((a,b)=>evs(b[1])-evs(a[1])).slice(0,8);
  const valCard=_rich.length?dcard('Richest on EV/Sales','<ul class="dlist">'+_rich.map(([t,c])=>`<li onclick="openDrill('${t}')"><b class="tk">${t}</b> <span class="mono">${fmtX(evs(c))}</span> <span class="mut">${esc(c.n)}</span></li>`).join('')+'</ul>','<span class="src">most speculative</span>'):'';
  const catChips='<div class="catbar">'+[['all','All'],['unmanned','🚁 Unmanned'],['space','🛰 Space'],['nuclear','⚛ Nuclear']].map(([k,l])=>'<button class="catchip'+(dashCat===k?' on':'')+'" onclick="setDashCat(\''+k+'\')">'+l+'</button>').join('')+'</div>';
  return onb+kpis+catChips+`<div class="dashgrid">${focusCard}${awardCard}${changedCard}${holdCard}${alerts}${reviewCard}${newsCard}${buzzCard}${catCard}${ideaCard}${valCard}${concCard}${progCard}${methodCard}</div>`;
}
/* ---------- HOLDINGS scorecard ---------- */
const SGSHORT={'sg-bull':'Confirms','sg-mix':'Mixed','sg-bear':'Against'};
function renderHoldings(){
  const rows=heldList();
  if(!rows.length)return '<div class="note">No holdings in this dataset.</div>';
  let totMV=rows.reduce((a,[vk,t,c])=>a+((c.hold&&c.hold[1])||0),0);
  rows.sort((a,b)=>((b[2].hold&&b[2].hold[1])||0)-((a[2].hold&&a[2].hold[1])||0));
  const body=rows.map(([vk,t,c])=>{
    const sig=streetSignal(t,c); const lp=(LIVE[t]&&LIVE[t].p)||null;
    const up=(lp&&c.street&&c.street.ptAvg)?Math.round((c.street.ptAvg/lp-1)*100):null;
    const mv=lp?Math.round(lp*c.hold[0]):c.hold[1];
    const ncat=nextCat(vk,t); const buzz=c.social?c.social.m:null;
    const sgs=SGSHORT[sig.cls]||'—';
    return `<tr onclick="openDrill('${t}')">
      <td class="tk">${t}</td><td class="nm">${esc(c.n)}</td><td class="mut">${VLABEL[vk].split(' ')[0]}</td>
      <td>$${Math.round(mv).toLocaleString()}</td>
      <td class="livep" data-live="${t}">…</td>
      <td class="${up>0?'up':up<0?'down':''}">${up!=null?((up>0?'+':'')+up+'%'):'<span class=mut>—</span>'}</td>
      <td><span class="sgpill ${sig.cls}" title="${esc(sig.why)}">${sgs}</span></td>
      <td>${buzz!=null?buzz:'<span class=mut>—</span>'}</td>
      <td>${score(c)??'—'}/${lean(c)??'—'}</td>
      <td class="nm mut">${ncat?(esc(ncat[0])+' — '+esc(ncat[2])):'—'}</td></tr>`;
  }).join('');
  return `<div class="note">Your <b>${rows.length}</b> holdings · total ≈ <b>$${Math.round(totMV).toLocaleString()}</b> (live where available, else last snapshot). Thesis⇄Street: green=Street confirms your bull, yellow=cooling, red=leaning against. Click a row to drill in.</div>
    <table class="comps holdtab"><thead><tr><th>Ticker</th><th>Company</th><th>Sector</th><th>Mkt value</th><th>Price</th><th>Upside to PT</th><th>Thesis⇄Street</th><th>Buzz</th><th>Score/Lean</th><th>Next catalyst</th></tr></thead><tbody>${body}</tbody></table>`;
}
/* ---------- NEWS feed (MT Newswires via Cowork) ---------- */
function anyCo(t){for(const vk in DATA.verticals){if(DATA.verticals[vk].companies[t])return DATA.verticals[vk].companies[t];}return null;}
function newsCatOf(meta){meta=meta||'';
  if(/mergers_acquisitions/.test(meta))return['M&A','nc-ma'];
  if(/new_projects_ventures|contract/.test(meta))return['Contract / Venture','nc-con'];
  if(/analyst_rating|analyst_upgrade|analyst_downgrade|analyst_initiates/.test(meta))return['Analyst','nc-an'];
  if(/equity_debt_offering/.test(meta))return['Capital raise','nc-cap'];
  if(/corporate_earnings|earnings_revision/.test(meta))return['Earnings','nc-ea'];
  if(/operations_update/.test(meta))return['Operations','nc-op'];
  return['Update','nc-ot'];}
async function newsFetch(symbols){const r=await window.cowork.callMcpTool(NEWS_TOOL,{dataset_name:'mt_newswires_north_america',product:'EDGE',symbols,last:45,limit:70});const o=(r&&r.structuredContent)?r.structuredContent:JSON.parse(r.content[0].text);try{return JSON.parse(o.result);}catch(e){return [];}}
function newsUniverse(){const set=new Set();for(const vk in DATA.verticals){const c=DATA.verticals[vk].companies;Object.keys(c).forEach(t=>{if(c[t].pub&&!MUTE.has(t))set.add(t);});}return [...set];}
async function loadNews(force){if(!liveOn)return;if(newsLoading)return;newsLoading=true;newsLoaded=true;render();
  const tks=newsUniverse();const chunks=[];for(let i=0;i<tks.length;i+=30)chunks.push(tks.slice(i,i+30));
  const seen=new Set();const items=[];
  for(const ch of chunks){try{const arr=await newsFetch(ch.join(','));arr.forEach(a=>{if(!a.subkey||seen.has(a.subkey))return;seen.add(a.subkey);items.push(a);});}catch(e){}}
  items.sort((a,b)=>(b.releaseTime||b.date||'').localeCompare(a.releaseTime||a.date||''));
  newsItems=items;newsLoading=false;render();}
function fmtNewsDate(a){const r=a.releaseTime||a.date||'';if(!r)return '';const d=new Date(r);if(isNaN(d))return a.date||'';return d.toLocaleDateString(undefined,{month:'short',day:'numeric'})+' '+d.toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'});}
function tickChips(a){const ks=[];if(a.key)ks.push(a.key);(a.related||'').split(/[ ,]+/).forEach(x=>{if(x&&!ks.includes(x))ks.push(x);});
  return ks.filter(k=>anyCo(k)).slice(0,5).map(k=>`<span class="ntk${MUTE.has(k)?' mega':''}" onclick="openDrill('${k}')">${k}</span>`).join('');}
function thesisHit(a){
  const c=anyCo(a.key); if(!c||!c.thesis)return null;
  const hay=((a.headline||'')+' '+(a.body||'')).toLowerCase();
  const bull=c.thesis.bull.filter(p=>(p.kw||[]).some(k=>k&&hay.includes(k))).map(p=>p.p);
  const bear=c.thesis.bear.filter(p=>(p.kw||[]).some(k=>k&&hay.includes(k))).map(p=>p.p);
  return (bull.length||bear.length)?{bull,bear}:null;
}
function impScore(a){const m=(a.metadata||'').toLowerCase(),h=(a.headline||'').toLowerCase();let sc=0;
  if(/mergers_acquisitions/.test(m))sc+=100;
  if(/new_projects_ventures|contract/.test(m)||/\bcontract\b|awarded|\baward\b|\bwins\b|\bwon\b|selected|sole.source/.test(h))sc+=95;
  if(/equity_debt_offering/.test(m)||/offering|prices \$|convertible|raises \$/.test(h))sc+=78;
  if(/analyst_rating|analyst_upgrade|analyst_downgrade|analyst_initiates/.test(m)||/price target|upgrade|downgrade|initiates coverage|raises target|cuts target/.test(h))sc+=74;
  if(/corporate_earnings|earnings_revision/.test(m)||/\bearnings\b|quarterly results|\bguidance\b|raises outlook|cuts outlook|backlog/.test(h))sc+=70;
  if(/operations_update/.test(m))sc+=38;
  if(thesisHit(a))sc+=55;
  if(/approval|\bfaa\b|\bfda\b|certif|milestone|maiden|first flight|delivery|deliver|partnership|joint venture|\border\b|down\s?select|booking/.test(h))sc+=16;
  // noise penalties
  if(/social_buzz|most_active/.test(m))sc-=70;
  if(/\bgainers\b|\bdecliners\b|\bmovers\b|wallstreetbets|social buzz|exchange-traded funds|equity futures|most active|sector etfs?/.test(h))sc-=80;
  return sc;}
function setNewsSort(k){newsSort=k;render();}
function renderNews(){
  if(!liveOn){let bn=(DATA.news||[]).slice().filter(a=>inVert(a.tk));if(newsFocus)bn=bn.filter(a=>WATCH.has(a.tk));if(q)bn=bn.filter(a=>(((a.h||'')+' '+(a.tk||'')).toLowerCase().includes(q)));
    const vchips='<div class="catbar">'+[['all','All'],['unmanned','🚁 Unmanned'],['space','🛰 Space'],['nuclear','⚛ Nuclear']].map(([k,l])=>'<button class="catchip'+(dashCat===k?' on':'')+'" onclick="setDashCat(\''+k+'\')">'+l+'</button>').join('')+'</div>';
    return vchips+`<div class="newsmeta">${newsFocus?'★ focus only · ':''}${bn.length} headlines · source: Yahoo Finance · refreshed daily · open inside Cowork for the full MT Newswires wire</div><div class="newslist">`+(bn.length?bn.map(a=>`<div class="nart"><div class="nmeta"><span class="tk">${esc(a.tk||'')}</span> <span class="ndate">${esc(a.pub||'')}${a.pub&&a.date?' · ':''}${esc(a.date||'')}</span></div><div class="nhead"><a href="${a.link}" target="_blank" rel="noopener">${esc(a.h||'')}</a></div></div>`).join(''):'<div class="note">No headlines yet — the daily updater will populate these.</div>')+`</div>`;}
  const cats=[['all','All'],['thesis','\u2605 My thesis'],['nc-con','Contract / Venture'],['nc-ma','M&A'],['nc-cap','Capital raise'],['nc-an','Analyst'],['nc-ea','Earnings'],['nc-op','Operations']];
  const bar=`<div class="newsbar"><div class="newscats">${cats.map(([k,l])=>`<button class="ncf${k===newsCat?' on':''}" onclick="setNewsCat('${k}')">${l}</button>`).join('')}</div>
    <label class="nck"><input type="checkbox" ${newsPrimary?'checked':''} onchange="newsPrimary=this.checked;render()"> Primary only</label>
    <label class="nck"><input type="checkbox" ${newsMega?'checked':''} onchange="toggleMega(this.checked)"> Include mega-caps</label>
    <label class="nck"><input type="checkbox" ${newsFocus?'checked':''} onchange="newsFocus=this.checked;render()"> ★ Focus only</label>
    <span class="newssort"><button class="ncf${newsSort==="time"?" on":""}" onclick="setNewsSort('time')">🕒 Latest</button><button class="ncf${newsSort==="imp"?" on":""}" onclick="setNewsSort('imp')">★ Most important</button></span><button class="pbtn" onclick="loadNews(true)">↻ Refresh</button></div>`;
  if(newsLoading&&!newsItems.length)return bar+`<div class="note">Sweeping the wire for all listed companies…</div>`;
  let items=newsItems.slice();
  if(newsPrimary)items=items.filter(a=>a.isPrimary!==false || anyCo(a.key)&&!MUTE.has(a.key));
  if(newsCat==='thesis')items=items.filter(a=>thesisHit(a));
  else if(newsCat!=='all')items=items.filter(a=>newsCatOf(a.metadata)[1]===newsCat);
  if(q)items=items.filter(a=>(a.headline||'').toLowerCase().includes(q)||(a.key||'').toLowerCase().includes(q));
  if(holdOnly){const held=new Set(heldList().map(x=>x[1])); items=items.filter(a=>held.has(a.key)||((a.related||'').split(/[ ,]+/).some(r=>held.has(r))));}
  if(pubOnly){items=items.filter(a=>{const c=anyCo(a.key);return !c||c.pub;});}
  if(newsFocus){items=items.filter(a=>WATCH.has(a.key)||((a.related||'').split(/[ ,]+/).some(r=>WATCH.has(r))));}
  if(newsSort==='imp'){items=items.filter(a=>impScore(a)>=25);items.sort((a,b)=>{const d=impScore(b)-impScore(a);return d!==0?d:(b.releaseTime||'').localeCompare(a.releaseTime||'');});}
  const list=items.slice(0,200).map(a=>{const[cl,cc]=newsCatOf(a.metadata);const body=(a.body||'').replace(/^[0-9:]+ [AP]M [A-Z]{2,4}, [0-9\/]+ \(MT Newswires\) -- /,'').slice(0,230);
    const th=thesisHit(a);return `<div class="nart"><div class="nmeta"><span class="ncat ${cc}">${cl}</span>${impScore(a)>=85?'<span class="ncrit">★ critical</span>':''}${th?`<span class="nth" title="${esc([...th.bull.map(x=>'BULL: '+x),...th.bear.map(x=>'BEAR: '+x)].join(' · '))}">★ thesis${th.bull.length&&th.bear.length?'':(th.bull.length?' (bull)':' (bear)')}</span>`:''}${tickChips(a)}<span class="ndate">${fmtNewsDate(a)}</span></div>
      <div class="nhead">${esc(a.headline||'')}</div><div class="nbody">${esc(body)}${body.length>=230?'…':''}</div></div>`;}).join('');
  return bar+`<div class="newsmeta">${newsFocus?'★ focus only · ':''}${holdOnly?'◆ holdings only · ':''}${items.length} stories${newsSort==='imp'?' · ranked by importance (deals, contracts, raises, ratings, earnings first)':''} across the investable universe · muting ${newsMega?'nothing':'mega/diversified names ('+[...MUTE].slice(0,6).join(', ')+'…)'} · source: MT Newswires</div><div class="newslist">${list||'<div class="note">No stories match.</div>'}</div>`;
}
function setNewsCat(k){newsCat=k;render();}
function toggleMega(v){newsMega=v;if(v){MUTE.clear();}else{['NVDA','TSLA','PLTR','UBER','QCOM','BA','RTX','LMT','NOC','HII','TXT','TDY','BIDU','D','DUK','SO','NEE','EXC','ETR','PEG'].forEach(x=>MUTE.add(x));}newsLoaded=false;newsItems=[];render();loadNews(true);}
/* drilldown latest news */
async function drillNews(t){if(!liveOn)return;try{const arr=await newsFetch(t);const el=document.getElementById('drillnews');if(!el)return;
  const items=arr.filter(a=>a.key===t).slice(0,5);
  el.innerHTML=items.length?items.map(a=>{const[cl,cc]=newsCatOf(a.metadata);return `<div class="dnews"><span class="ncat ${cc}">${cl}</span> <span class="ndate">${fmtNewsDate(a)}</span><div class="dnh">${esc(a.headline||'')}</div></div>`;}).join(''):'<div class="mut" style="font-size:11px">No recent wire stories.</div>';
}catch(e){}}

/* ---------- boot ---------- */
if(!liveOn){for(const vk in DATA.verticals){const cc=DATA.verticals[vk].companies;for(const t in cc){if(cc[t].px!=null)LIVE[t]={p:cc[t].px,chg:cc[t].chg||0};}}}
renderChrome();render();
window.addEventListener('resize',()=>{if(curTab==='map')drawEdges();});


</script>
